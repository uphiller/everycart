# Builds the Vite frontend Docker image and pushes to Docker Hub.
#
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (access token from hub.docker.com → Account Settings → Security)
# Optional variables: DOCKER_IMAGE (namespace/repo), DOCKER_TAG (default image: uphiller/everycart:front)

name: Frontend — Docker build & push

on:
  push:
    branches: [main]
    paths:
      - "front/**"
      - ".github/workflows/deploy-frontend.yml"
  pull_request:
    paths:
      - "front/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE != '' && vars.DOCKER_IMAGE || 'uphiller/everycart' }}
  DOCKER_TAG: ${{ vars.DOCKER_TAG != '' && vars.DOCKER_TAG || 'front' }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validation only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./front
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./front
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
