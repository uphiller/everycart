# ECS / dev 프로필 (spring.profiles.active=dev)
# DB·Keycloak: Supabase + auth.<domain> (Terraform ECS + application-dev.yml)
# Keycloak 에 realm "everycart" 생성 후 이 issuer 와 일치해야 합니다.

server:
  port: 8081

app:
  cors:
    allowed-origins:
      - https://everycart.bettercodelab.com

# Keycloak Admin REST — 로컬은 master / admin-cli + admin 계정(비밀번호 grant). 운영은 서비스 계정(client_credentials) 권장.
everycart:
  keycloak:
    server-url: https://auth.bettercodelab.com
    realm: everycart
    admin-token-realm: master
    admin-client-id: admin-cli
    admin-username: ${KEYCLOAK_ADMIN_USERNAME}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD}
    user-token-client-id: ${EVERYCART_KEYCLOAK_USER_CLIENT_ID}

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.bettercodelab.com/realms/everycart

  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?currentSchema=everycart
    username: postgres.jsadkloxgwvzucualbje
    password: ${backend_java_db_password}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: everycart
        format_sql: true

logging:
  level:
    root: INFO
    web: DEBUG
    com.everycart.keycloak: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
